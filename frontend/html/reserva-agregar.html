<div class="cabezeraCuerpo">
    <div class="tituloCabecera">
        <p>Nueva Reserva</p>
    </div>
</div>

<div class="contenido">
    <div class="formulario-reserva">
        <div class="form-section">
            <label for="cliente-select">Cliente</label>
            <div class="input-group">
                <select id="cliente-select">
                    <option value="">Seleccione un cliente...</option>
                </select>
                <button id="btn-crear-cliente" title="Nuevo Cliente">+</button>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="piso-select">Piso</label>
                <select id="piso-select">
                    <option value="">Todos los pisos</option>
                </select>
            </div>
            <div class="form-group">
                <label for="mesa-select">Mesa</label>
                <select id="mesa-select">
                    <option value="">Seleccione mesa...</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha">
            </div>
            <div class="form-group">
                <label for="hora">Hora</label>
                <input type="time" id="hora">
            </div>
        </div>

        <div class="botones-form">
            <button class="confirmar">Guardar Reserva</button>
            <button class="atras">Cancelar</button>
        </div>
    </div>
</div>
