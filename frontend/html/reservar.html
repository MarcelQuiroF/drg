<div class="reservas-header-container">
    <div class="reservas-title-box">
        <h1 class="reservas-main-title">Gestión de Reservas</h1>
    </div>
    <div class="reservas-actions">
        <button class="btn-config-icon" id="btn-abrir-settings" title="Configurar Tiempos">
            <i class="fa-solid fa-sliders"></i>
        </button>
    </div>
</div>

<div class="reservas-content-area">
    <div class="table-wrapper">
        <table class="dragon-table">
            <thead>
                <tr>
                    <th>Información del Cliente</th>
                    <th>Fecha de Reserva</th>
                    <th>Horario</th>
                    <th>Ubicación</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="reserva-tbody">
                </tbody>
        </table>
    </div>

    <div class="reservas-footer">
        <button class="btn-nueva-reserva-dragon" id="btn-nueva-reserva">
            <i class="fa-solid fa-plus"></i> Nueva Reserva
        </button>
    </div>
</div>
