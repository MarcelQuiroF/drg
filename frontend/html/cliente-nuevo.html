<div class="cabezeraCuerpo">
    <div class="tituloCabecera">
        <p>Nuevo Cliente</p>
    </div>
    <div class="informacion"></div>
</div>

<div class="contenido" id="contenido">
    <div class="formulario-datos-personales">
        
        <div class="campo-full">
            <label for="new-nombre">Nombre Completo:</label>
            <input type="text" id="new-nombre" placeholder="Ej: Juan Perez">
        </div>

        <div class="campos-dobles">
            <div class="campo-half">
                <label for="new-ci">CI / NIT:</label>
                <input type="text" id="new-ci" placeholder="Ej: 1234567">
            </div>
            <div class="campo-half">
                <label for="new-telf">Teléfono:</label>
                <input type="text" id="new-telf" placeholder="Ej: 70012345">
            </div>
        </div>

        <div class="botones" style="margin-top: 20px;">
            <button class="confirmar" id="btn-guardar-cliente">Guardar Cliente</button>
            <button class="atras" id="btn-cancelar-cliente">Cancelar</button>
        </div>
    </div>
</div>
