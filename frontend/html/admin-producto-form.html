<link rel="stylesheet" href="../css/admin-form.css">

<div class="contenido" id="form-producto-wrapper" style="display:flex; justify-content:center; align-items:center; height:100%;">
    
    <div class="main-container">
        <h2 id="form-title" style="color: white; margin-bottom: 20px; text-align: center;">Nuevo Producto</h2>

        <div class="form-content">
            
            <div class="image-section">
                <div class="image-display">
                    <img id="preview-img" src="../assets/imágenes/imagenMesaBeige.png" alt="img producto">
                </div>
                <input type="file" id="file-input" accept="image/*" style="display: none;">
                <button class="upload-button" id="btn-upload-img">
                    <i class='bx bx-upload'></i> 
                    <span style="margin-left: 5px;">Subir foto...</span>
                </button>
            </div>

            <div class="fields-section">

                <div class="form-group">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" placeholder="Ej: Pizza Napolitana">
                </div>

                <div class="form-group">
                    <label for="precio">Precio:</label>
                    <input type="number" id="precio" placeholder="0.00" style="width: 100px; text-align: right;">
                    <span style="margin-left: 10px; color: #fff;">Bs.</span>
                </div>

                <div class="form-group status-group">
                    <label for="estado">Estado:</label>
                    <select id="estado" style="width: 150px;">
                        <option value="true" selected>Activo</option>
                        <option value="false">Inactivo</option>
                    </select>
                </div>
                
                <div class="category-group">
                    <div class="form-group">
                        <label for="categoria">Categoría:</label>
                        <div class="select-wrapper" style="flex-grow: 1;">
                            <select id="categoria">
                                <option value="" disabled selected>Cargando...</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group zone-group">
                        <label for="zona" class="zone-label">Zona:</label>
                        <div class="select-wrapper">
                            <select id="zona">
                                <option value="COCINA">Cocina</option>
                                <option value="BARRA">Barra</option>
                                <option value="JUEGO">Juego</option>
                            </select>
                        </div>
                    </div>
                </div>

            </div>
        </div>
        
        <div class="save-button-container">
            <button class="save-button" id="btn-guardar-producto">GUARDAR</button>
            <button class="cancel-button" id="btn-cancelar-producto" style="margin-left: 15px; background: transparent; color: white; border: 1px solid white; padding: 12px 30px; border-radius: 25px; cursor: pointer;">CANCELAR</button>
        </div>

    </div>
</div>
